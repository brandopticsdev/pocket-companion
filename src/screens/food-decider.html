lass="segment-text" text-anchor="middle" transform="rotate(144 50 50) translate(0 -32)">PHO MI PLEASE</text><text class="segment-text" text-anchor="middle" transform="rotate(180 50 50) translate(0 -32)">PA GENERAL STORE</text><text class="segment-text" text-anchor="middle" transform="rotate(216 50 50) translate(0 -32)">WANNA SPOON</text><text class="segment-text" text-anchor="middle" transform="rotate(252 50 50) translate(0 -32)">MARY'S CHICKEN</text><text class="segment-text" text-anchor="middle" transform="rotate(288 50 50) translate(0 -32)">TOP DOG COCKTAILS</text><text class="segment-text" text-anchor="middle" transform="rotate(324 50 50) translate(0 -32)">CHAR LOBSTER ROLLS</text></g></svg></div>

<script>
    const wheel = document.getElementById('decider-wheel');
    const spinBtn = document.getElementById('spin-button');
    const resultDisplay = document.getElementById('result-display');
    const resultName = document.getElementById('result-name');

    const vendors = [
        "TWISTED GINGERS",
        "PA GENERAL STORE",
        "2 STREET SAMMIES",
        "WANNA SPOON",
        "TOP DOG COCKTAILS",
        "MARY'S CHICKEN",
        "DOUBLE DOWN KITCHEN",
        "LUCKY'S ROADSIDE",
        "CHAR LOBSTER ROLLS",
        "PHO MI PLEASE"
    ];

    let currentRotation = 0;
    let isSpinning = false;

    spinBtn.addEventListener('click', () => {
        if (isSpinning) return;

        isSpinning = true;
        resultDisplay.classList.add('opacity-0', 'translate-y-8');
        
        // Randomly spin between 3 and 7 full rotations plus a random segment
        const extraDegrees = Math.floor(Math.random() * 360);
        const totalDegrees = 1440 + extraDegrees; // 4 full turns + random
        
        currentRotation += totalDegrees;
        wheel.style.transform = `rotate(${currentRotation}deg)`;

        // Wait for animation to finish
        setTimeout(() => {
            isSpinning = false;
            
            // Calculate which vendor it landed on
            // 360 degrees / 10 segments = 36 degrees per segment
            const actualDegrees = currentRotation % 360;
            // Adjustment for pointer at top. 
            // Segment 0 (Twisted Gingers) is at 0 degrees.
            // Wheel spins clockwise, so a rotation of 'x' degrees moves 
            // the segments counter-clockwise relative to the pointer.
            const segmentIndex = Math.floor(((360 - actualDegrees + 18) % 360) / 36);
            
            resultName.innerText = vendors[segmentIndex];
            resultDisplay.classList.remove('opacity-0', 'translate-y-8');
            
            // Trigger celebratory micro-interaction
            resultDisplay.classList.add('scale-105');
            setTimeout(() => resultDisplay.classList.remove('scale-105'), 200);
        }, 4000);
    });
</script>
